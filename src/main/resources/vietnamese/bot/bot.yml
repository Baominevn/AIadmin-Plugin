bot:
  enabled: true
  bot_name: "Grox"
  selected: ""
  trigger_tier: "ALERT"
  observe_seconds: 600
  follow_interval_ticks: 20
  commands:
    spawn: []
    follow: []
    remove: []
  znpcs:
    enabled: true
    id_start: 100
    plugin_names: ["ZNPCs", "ZNPCsPlus"]
    commands:
      create: "znpcs create {znpc_id} PLAYER {bot_name}"
      line: "znpcs lines {znpc_id} {znpc_line}"
      skin: "znpcs skin {znpc_id} {skin}"
      toggle_look: "znpcs toggle {znpc_id} look"
      delete: "znpcs delete {znpc_id}"
      after_create: ""
    grox:
      id: 100
      skin: "zombie"
      line: "&c&l[ADMIN]-&bGrox"
      toggle_look: true
    toggle_look_for_all: false
  ai:
    enabled: true
    use_llm: true
    llm_prefix: "[BotAI] "
    report_chat: true
    report_interval_seconds: 18
    playful_rate: 0.18
    voice:
      normal:
        - "[BotAI] {bot} đang theo dõi {player} | tier={tier} | suspicion={suspicion}"
        - "[BotAI] {player} hiện có {alerts} cảnh báo, tiếp tục quan sát thêm. {learning}"
      playful:
        - "[BotAI] {player} đang hơi gắt, staff để ý kỹ thêm nhé."
        - "[BotAI] Nhìn qua thì {player} khá căng, theo tiếp vài nhịp nữa xem sao."
      danger:
        - "[BotAI] Cảnh báo cao: {player} đang ở tier={tier}, nên kiểm tra ngay."
        - "[BotAI] Dấu hiệu hack của {player} đang rõ dần, cảnh báo={alerts}, suspicion={suspicion}. {learning}"
