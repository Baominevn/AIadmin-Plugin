bot_rule:
  enabled: true
  ai:
    enabled: true
    allow_llm: true
    personality: "thông minh, rõ ràng, hữu ích, nói tự nhiên như người chơi"
    style_hint: "ngắn gọn, tự nhiên, không dài dòng, có thể dí dỏm nhẹ"
    max_reply_chars: 220
    safe_reply: "Mình chưa thể trả lời nội dung này theo luật bot."
    blocked_topics:
      - "hướng dẫn hack"
      - "bypass anti-cheat"
      - "ddos"
      - "exploit server"
    blocked_phrases:
      - "tool hack free"
      - "dupe bug mới nhất"
      - "lệnh phá server"
  learning:
    enabled: true
    hack_weight_multiplier: 1.20
    legit_weight_multiplier: 1.05
    movement_spike_threshold: 0.95
    vertical_spike_threshold: 0.48
    fast_yaw_threshold: 60.0
    low_pitch_change_threshold: 1.2
    cps_warn: 13
    cps_flag: 16
    extra_suspicion_when_consistent: 2
    extra_suspicion_cooldown_ms: 9000
    direct_suspicion_points: 2
    direct_suspicion_cooldown_ms: 8000
    direct_min_signals: 2
    immediate_strength_threshold: 5
