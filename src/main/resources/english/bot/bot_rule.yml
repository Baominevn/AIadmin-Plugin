bot_rule:
  enabled: true
  ai:
    enabled: true
    allow_llm: true
    personality: "smart, clear, useful, and natural like a real player"
    style_hint: "short, natural, not too wordy, light humor is okay"
    max_reply_chars: 220
    safe_reply: "I can't answer that because of bot rules."
    blocked_topics:
      - "hack tutorial"
      - "bypass anti-cheat"
      - "ddos"
      - "server exploit"
    blocked_phrases:
      - "free hack tool"
      - "latest dupe bug"
      - "server destroy command"
  learning:
    enabled: true
    hack_weight_multiplier: 1.20
    legit_weight_multiplier: 1.05
    movement_spike_threshold: 0.95
    vertical_spike_threshold: 0.48
    fast_yaw_threshold: 60.0
    low_pitch_change_threshold: 1.2
    cps_warn: 13
    cps_flag: 16
    extra_suspicion_when_consistent: 2
    extra_suspicion_cooldown_ms: 9000
    direct_suspicion_points: 2
    direct_suspicion_cooldown_ms: 8000
    direct_min_signals: 2
    immediate_strength_threshold: 5
